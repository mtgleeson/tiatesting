plugins {
    id 'java'
    id 'signing'
    id 'maven-publish'
}

// Use the build script defined in buildSrc
apply from: rootProject.file('buildSrc/shared.gradle')

dependencies {
    implementation project(':tia-core')
    implementation group: 'junit', name: 'junit', version: junit4Version
    compileOnly group: 'org.slf4j', name: 'slf4j-api', version: slf4jVersion // don't include in transitive dependencies
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifactId = 'tia-junit4'

            pom {
                name = 'Tia JUnit4'
                description = 'This library contains the base logic for running Tia with JUnit4.'
            }
        }
    }
}
